<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Reset HWID </title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Work.ink popup ads -->
  <script src="https://cdn.work.ink/js/redirect.js?id=1200" data-url="https://work.ink/direct/1200" data-max="5"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .container {
      margin-top: 100px;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
      max-width: 400px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .continue-button {
      margin-top: 20px;
      padding: 12px 24px;
      font-size: 16px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: not-allowed;
      opacity: 0.5;
      transition: background 0.3s;
    }

    .continue-button.enabled {
      cursor: pointer;
      opacity: 1;
    }

    .ad-warning {
      color: #b00;
      font-weight: bold;
      margin-top: 20px;
      display: none;
      background: #ffeeee;
      padding: 15px;
      border-radius: 8px;
    }

    /* Floating 160x300 ad bottom-right */
    .adsterra-box {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 160px;
      height: 300px;
      z-index: 9999;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    /* Center top 300x250 ad */
    .adsterra-top {
      margin-top: 20px;
      margin-bottom: 20px;
      width: 300px;
      height: 250px;
      display: block;
      margin-left: auto;
      margin-right: auto;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      background: #fff;
    }

    @media (max-width: 600px) {
      .adsterra-box {
        display: none; /* hide floating ad on small screens */
      }
      .adsterra-top {
        width: 100%;
        height: auto;
      }
    }
  </style>
</head>
<body>

  <!-- Top 300x250 Adsterra Banner -->
  <div class="adsterra-top" id="adsterra-top-ad">
    <script type="text/javascript">
      atOptions = {
        'key': '8683ed64eb9e512b97d8d63bc0c447ef',
        'format': 'iframe',
        'height': 250,
        'width': 300,
        'params': {}
      };
    </script>
    <script type="text/javascript" src="//www.highperformanceformat.com/8683ed64eb9e512b97d8d63bc0c447ef/invoke.js"></script>
  </div>

  <!-- Main Content -->
  <div class="container">
    <h1>Reset Key HWID </h1>
    <p>Please wait <span id="countdown">10</span> seconds before continuing.</p>
    <button class="continue-button" id="continueBtn" disabled>Click to Continue</button>

    <div class="ad-warning" id="adblock-msg">
      We noticed you’re using an ad blocker.<br />
      Please consider disabling it on this site to support us!
    </div>
  </div>

  <!-- Floating 160x300 Adsterra Banner bottom-right -->
  <div class="adsterra-box" id="adsterra-ad">
    <script type="text/javascript">
      atOptions = {
        'key': '028f39517473b373c62636ed6a77798e',
        'format': 'iframe',
        'height': 300,
        'width': 160,
        'params': {}
      };
    </script>
    <script type="text/javascript" src="//www.highperformanceformat.com/028f39517473b373c62636ed6a77798e/invoke.js"></script>
  </div>

  <script>
    // 10-second countdown for continue button
    let timeLeft = 10;
    const countdownEl = document.getElementById("countdown");
    const btn = document.getElementById("continueBtn");
    const adblockMsg = document.getElementById("adblock-msg");

    const interval = setInterval(() => {
      timeLeft--;
      countdownEl.textContent = timeLeft;
      if (timeLeft <= 0) {
        clearInterval(interval);
        btn.disabled = false;
        btn.classList.add("enabled");
        btn.style.cursor = "pointer";
        btn.onclick = function () {
          window.location.href = "https://pandadevelopment.net/reset-hwid?service=hackmanhubreal";
        };
      }
    }, 1000);

    // Simple adblock detection
    setTimeout(() => {
      // Create a bait element with common ad class names
      const bait = document.createElement('div');
      bait.className = 'adsbox';
      bait.style.position = 'absolute';
      bait.style.height = '1px';
      bait.style.width = '1px';
      bait.style.top = '-1000px';
      document.body.appendChild(bait);

      setTimeout(() => {
        const detected = !bait || bait.offsetHeight === 0 || bait.offsetLeft === 0 && bait.offsetParent === null;
        if (detected) {
          adblockMsg.style.display = 'block';
        }
        document.body.removeChild(bait);
      }, 50);
    }, 1000);
  </script>

</body>
</html>
