<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lua Obfuscator 🔒</title>
  <style>
    body {
      background-color: #0d0d0d;
      color: #00ffcc;
      font-family: monospace;
      padding: 20px;
    }
    textarea {
      width: 100%;
      padding: 10px;
      background: #1a1a1a;
      border: 1px solid #00ffcc;
      color: #00ffcc;
      font-size: 14px;
      border-radius: 5px;
      margin-bottom: 10px;
    }
    button {
      padding: 10px;
      background-color: #00ffcc;
      border: none;
      font-weight: bold;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>BETA  Lua Obfuscator</h1>
  <textarea id="input" rows="10" placeholder="Paste your Lua code..."></textarea>
  <button onclick="obfuscate()">🔐 Obfuscate</button>
  <textarea id="output" rows="10" readonly placeholder="Obfuscated code appears here..."></textarea>

  <script>
    const bannedWords = ["hackmanhub", "hackmannaman", "hackhuac", "hack", "skid", "skidded", "exploit"];

    function randomVar(len) {
      const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
      let result = "";
      for (let i = 0; i < len; i++) {
        result += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return "_" + result;
    }

    function obfuscate() {
      let code = document.getElementById("input").value;

      // Check for banned words
      for (let word of bannedWords) {
        if (code.toLowerCase().includes(word)) {
          alert("❌ Banned word detected: " + word);
          return;
        }
      }

      // Remove comments
      code = code.replace(/--\[\[.*?\]\]/gs, "");
      code = code.replace(/--.*$/gm, "");

      // Minify whitespace
      code = code.replace(/\s+/g, " ").trim();

      // Rename locals
      const varMap = {};
      let varIndex = 0;
      code = code.replace(/\blocal\s+([a-zA-Z_][a-zA-Z0-9_]*)/g, function(match, varName) {
        const obf = randomVar(8);
        varMap[varName] = obf;
        return "local " + obf;
      });

      for (const orig in varMap) {
        const re = new RegExp("\\b" + orig + "\\b", "g");
        code = code.replace(re, varMap[orig]);
      }

      // Encode string literals
      code = code.replace(/"(.*?)"/g, function(_, str) {
        let encoded = "";
        for (let i = 0; i < str.length; i++) {
          encoded += "\\" + str.charCodeAt(i);
        }
        return '"' + encoded + '"';
      });

      document.getElementById("output").value = code;
    }
  </script>

</body>
</html>
